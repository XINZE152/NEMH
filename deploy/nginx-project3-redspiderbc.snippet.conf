# 将以下片段合并进 /etc/nginx/sites-available/pd.conf
# 中「listen 443 ssl」且 server_name 为 redspiderbc.cn 的 server { ... } 块内，
# 建议放在已有 location ^~ /project1/、/project2/ 之后、较宽泛的 location / 之前。
#
# 静态文件目录约定（与 project3-https-setup.md 一致）：
#   /var/www/redspider-sites/project3/   ← npm build 产物复制到这里
# 后端：127.0.0.1:8003（nemh-api），与主站 /api/ -> 8001 互不冲突。

location ^~ /project3/api/ {
    proxy_pass http://127.0.0.1:8003/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /project3/ {
    # 用 alias 直接指向目录，避免 root + try_files 在部分版本下对 /project3/ 误判为 404
    alias /var/www/redspider-sites/project3/;
    index index.html;
}

# 无尾部斜杠时重定向到目录（可选，减少个别客户端 404）
location = /project3 {
    return 301 /project3/;
}
